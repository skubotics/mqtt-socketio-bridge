<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF8">
    <title>MQTT Web Viewer</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script type="text/javascript">
        var socket = io('http://13.235.151.163:3000/');

        socket.on('connect', function() {
            console.log("Connected to the server!");
            // Subscribe to a topic
            socket.emit('subscribe', {topic: 'test'});
        });

        socket.on('mqtt', function(data) {
            console.log("Received data: ", data);
            // You can update the webpage dynamically with this data
            document.getElementById("messages").innerHTML += `<p>Topic: ${data.topic} - Message: ${data.payload}</p>`;
        });

        socket.on('disconnect', function() {
            console.log("Disconnected from the server!");
        });
    </script>
</head>
<body>
    <h1>MQTT Messages</h1>
    <div id="messages"></div>
</body>
</html>
